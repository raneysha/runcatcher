<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Syne', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }
    body { background: #0a0a0f; color: #e2e2e2; }
    .grain { position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
    .mesh { position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(99,211,180,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 80% 80%,rgba(59,184,224,.05) 0%,transparent 60%); }
    .card { background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;backdrop-filter:blur(12px); }
    .btn-primary { background:linear-gradient(135deg,#63d3b4,#3bb8e0);color:#0a0a0f;font-weight:700;border-radius:10px;transition:all .2s;cursor:pointer; }
    .btn-primary:hover { opacity:.85;transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.5;cursor:not-allowed;transform:none; }
    .btn-ghost { background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#e2e2e2;border-radius:10px;transition:all .2s;cursor:pointer; }
    .btn-ghost:hover { background:rgba(255,255,255,.09); }
    .btn-danger { background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171;border-radius:8px;transition:all .2s;cursor:pointer; }
    .btn-danger:hover { background:rgba(239,68,68,.22); }
    .field { background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#e2e2e2;border-radius:10px;outline:none;transition:border-color .2s;width:100%;padding:12px 16px; }
    .field:focus { border-color:rgba(99,211,180,.5); }
    .field::placeholder { color:rgba(255,255,255,.25); }
    select.field option { background:#1a1a2e; }
    .drop-zone { border:2px dashed rgba(99,211,180,.3);border-radius:14px;transition:all .2s;cursor:pointer; }
    .drop-zone:hover { border-color:rgba(99,211,180,.7);background:rgba(99,211,180,.04); }
    .img-card { background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;transition:all .25s; }
    .img-card:hover { border-color:rgba(99,211,180,.3);transform:translateY(-3px); }
    .tab-active { background:rgba(99,211,180,.12);color:#63d3b4;border-bottom:2px solid #63d3b4; }
    .badge { background:rgba(99,211,180,.12);color:#63d3b4;border-radius:999px;font-size:.7rem;letter-spacing:.05em;padding:2px 10px; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn .3s ease forwards; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { animation:spin .8s linear infinite;border:2px solid transparent;border-top-color:#63d3b4;border-radius:50%;width:32px;height:32px; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(99,211,180,.2);border-radius:2px; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="mesh"></div>
  <div id="root" style="position:relative;z-index:1"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const BASE = "http://localhost:8000";

    // ── API ─────────────────────────────────────────────────────────────────
    function getToken() { return localStorage.getItem("token"); }

    async function apiFetch(path, opts = {}) {
      const token = getToken();
      const headers = { ...opts.headers };
      if (token) headers["Authorization"] = `Bearer ${token}`;
      const res = await fetch(BASE + path, { ...opts, headers });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || res.statusText);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    const API = {
      register: (name, email, password) =>
        apiFetch("/auth/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, password }) }),

      login: async (email, password) => {
        const res = await fetch(`${BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ username: email, password }),
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || "Login failed"); }
        return res.json();
      },

      list: () => apiFetch("/images/"),

      upload: (file, description) => {
        const fd = new FormData();
        fd.append("file", file);
        if (description) fd.append("description", description);
        return apiFetch("/images/upload", { method: "POST", body: fd });
      },

      deleteImg: (id) => apiFetch(`/images/${id}`, { method: "DELETE" }),

      search: (file, params) => {
        const fd = new FormData();
        fd.append("file", file);
        const q = new URLSearchParams({
          model_name: params.model || "VGG-Face",
          distance_metric: params.metric || "cosine",
          database_type: "postgres",
          detector_backend: params.detector || "opencv",
          align: params.align,
          l2_normalize: params.l2,
          limit: params.limit || 10,
        });
        return apiFetch(`/faces/search?${q}`, { method: "POST", body: fd });
      },
    };

    // ── COMPONENTS ──────────────────────────────────────────────────────────
    function Toast({ msg, type }) {
      return (
        <div className={`fixed bottom-6 right-6 z-50 fade-in px-5 py-3 rounded-xl text-sm font-semibold shadow-xl ${type === "ok" ? "bg-teal-400 text-gray-900" : "bg-red-500 text-white"}`}>
          {msg}
        </div>
      );
    }

    function Spinner() {
      return <div className="flex justify-center py-16"><div className="spinner" /></div>;
    }

    function ErrorBox({ msg }) {
      return <div className="px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm mono mb-4">{msg}</div>;
    }

    function Logo() {
      return (
        <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,#63d3b4,#3bb8e0)"}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" strokeWidth="2" className="w-4 h-4">
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </div>
      );
    }

    // ── AUTH PAGE ───────────────────────────────────────────────────────────
    function AuthPage({ onLogin }) {
      const [mode, setMode] = useState("login");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const nameRef = useRef(); 
      const emailRef = useRef();
      const passRef = useRef();

      async function handleSubmit(e) {
        e.preventDefault();
        const name  = nameRef.current?.value || "";
        const email = emailRef.current.value;
        const pass  = passRef.current.value;

        setLoading(true);
        setError(null);
        try {
          if (mode === "login") {
            const { access_token } = await API.login(email, pass);
            localStorage.setItem("token", access_token);
            onLogin();
          } else {
            await API.register(name, email, pass);
            setMode("login");
            setError(null);
            alert("Account created! Please sign in.");
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex items-center justify-center px-4">
          <div className="w-full max-w-sm fade-in">
            <div className="text-center mb-10">
              <div className="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-5" style={{background:"linear-gradient(135deg,#63d3b4,#3bb8e0)"}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" strokeWidth="2" className="w-8 h-8">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight">FaceVault</h1>
              <p className="text-gray-500 text-sm mt-1 mono">{mode === "login" ? "sign in to continue" : "create your account"}</p>
            </div>

            <div className="card p-8" style={{boxShadow:"0 0 40px rgba(99,211,180,.1)"}}>
              {error && <ErrorBox msg={error} />}
              <form onSubmit={handleSubmit}>
                <div className="space-y-4">
                  {mode === "register" && (
                    <div>
                      <label className="text-xs text-gray-500 mono block mb-1">Name</label>
                      <input ref={nameRef} required placeholder="Your name" className="field" />
                    </div>
                  )}
                  <div>
                    <label className="text-xs text-gray-500 mono block mb-1">Email</label>
                    <input ref={emailRef} type="email" required placeholder="you@example.com" className="field" />
                  </div>
                  <div>
                    <label className="text-xs text-gray-500 mono block mb-1">Password</label>
                    <input ref={passRef} type="password" required placeholder="••••••••" className="field" />
                  </div>
                  <button type="submit" disabled={loading} className="btn-primary w-full py-3 mt-2">
                    {loading ? "Please wait…" : mode === "login" ? "Sign in" : "Create account"}
                  </button>
                </div>
              </form>
              <p className="text-center text-sm text-gray-500 mt-6">
                {mode === "login" ? "No account? " : "Already have one? "}
                <button onClick={() => { setMode(mode === "login" ? "register" : "login"); setError(null); }}
                  className="text-teal-400 hover:text-teal-300 font-semibold">
                  {mode === "login" ? "Sign up" : "Sign in"}
                </button>
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ── NAV ─────────────────────────────────────────────────────────────────
    function Nav({ page, setPage, onLogout }) {
      const tabs = ["gallery", "upload", "search"];
      return (
        <nav className="flex items-center justify-between px-8 py-5 border-b border-white/5">
          <div className="flex items-center gap-2">
            <Logo />
            <span className="text-lg font-extrabold tracking-tight">FaceVault</span>
          </div>
          <div className="flex gap-1">
            {tabs.map(t => (
              <button key={t} onClick={() => setPage(t)}
                className={`px-4 py-2 text-sm rounded-lg transition-all ${page === t ? "tab-active" : "text-gray-400 hover:text-gray-200 hover:bg-white/5"}`}>
                {t.charAt(0).toUpperCase() + t.slice(1)}
              </button>
            ))}
          </div>
          <button onClick={onLogout} className="btn-ghost px-4 py-2 text-sm">Sign out</button>
        </nav>
      );
    }

    // ── GALLERY ─────────────────────────────────────────────────────────────
    function GalleryPage({ setPage }) {
      const [images, setImages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);

      function showToast(msg, type = "ok") {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      }

      async function load() {
        setLoading(true);
        try { setImages(await API.list()); }
        catch (e) { showToast(e.message, "err"); }
        finally { setLoading(false); }
      }

      useEffect(() => { load(); }, []);

      async function handleDelete(id) {
        try {
          await API.deleteImg(id);
          showToast("Image deleted");
          load();
        } catch (e) { showToast(e.message, "err"); }
      }

      return (
        <div className="max-w-6xl mx-auto px-8 py-10 fade-in">
          {toast && <Toast {...toast} />}
          <div className="flex items-center justify-between mb-8">
            <div>
              <h2 className="text-2xl font-bold">My Images</h2>
              <p className="text-gray-500 text-sm mono mt-1">{images.length} file{images.length !== 1 ? "s" : ""} stored</p>
            </div>
            <button className="btn-primary px-5 py-2.5 text-sm" onClick={() => setPage("upload")}>+ Upload</button>
          </div>
          {loading ? <Spinner /> : images.length === 0 ? (
            <div className="card p-16 text-center">
              <div className="text-4xl mb-4">🗂️</div>
              <p className="text-gray-500 mono text-sm">No images yet — upload something</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
              {images.map(img => (
                <div key={img.id} className="img-card fade-in">
                  <div className="aspect-square overflow-hidden bg-white/5">
                    <img src={BASE + img.thumbnail_url} alt="" className="w-full h-full object-cover" />
                  </div>
                  <div className="p-3">
                    {img.description && <p className="text-xs text-gray-300 truncate mb-2">{img.description}</p>}
                    <div className="flex items-center justify-between">
                      <span className="mono text-xs text-gray-600">#{img.id}</span>
                      <button className="btn-danger px-2.5 py-1 text-xs" onClick={() => handleDelete(img.id)}>Delete</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── UPLOAD ──────────────────────────────────────────────────────────────
    function UploadPage({ setPage }) {
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [desc, setDesc] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const inputRef = useRef();

      function handleFile(f) {
        if (!f) return;
        setFile(f);
        setPreview(URL.createObjectURL(f));
      }

      async function handleSubmit(e) {
        e.preventDefault();
        if (!file) return setError("Please select an image");
        setLoading(true);
        setError(null);
        try {
          await API.upload(file, desc);
          setPage("gallery");
        } catch (err) {
          setError(err.message);
          setLoading(false);
        }
      }

      return (
        <div className="max-w-lg mx-auto px-8 py-10 fade-in">
          <h2 className="text-2xl font-bold mb-1">Upload Image</h2>
          <p className="text-gray-500 text-sm mono mb-8">Supported: JPG, PNG, WebP, GIF · max 10 MB</p>
          {error && <ErrorBox msg={error} />}
          <form onSubmit={handleSubmit} className="space-y-5">
            <div className="drop-zone p-8 text-center"
              onClick={() => inputRef.current.click()}
              onDragOver={e => e.preventDefault()}
              onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}>
              {preview
                ? <img src={preview} alt="" className="w-40 h-40 object-cover rounded-xl mx-auto mb-3" />
                : <div className="text-4xl mb-3">📁</div>}
              <p className="text-sm text-gray-400 mono">{file ? file.name : "Click or drag an image here"}</p>
              <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={e => handleFile(e.target.files[0])} />
            </div>
            <div>
              <label className="text-xs text-gray-500 mono block mb-1">Description (optional)</label>
              <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="Add a description…" className="field" />
            </div>
            <button type="submit" disabled={loading} className="btn-primary w-full py-3">
              {loading ? "Uploading…" : "Upload Image"}
            </button>
          </form>
        </div>
      );
    }

    // ── SEARCH ──────────────────────────────────────────────────────────────
    function SearchPage() {
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [results, setResults] = useState(null);
      const [params, setParams] = useState({ model:"VGG-Face", metric:"cosine", detector:"opencv", align:"true", l2:"true", limit:"10" });
      const inputRef = useRef();

      function handleFile(f) {
        if (!f) return;
        setFile(f);
        setPreview(URL.createObjectURL(f));
      }

      function setParam(k, v) { setParams(p => ({ ...p, [k]: v })); }

      async function handleSubmit(e) {
        e.preventDefault();
        if (!file) return setError("Please select a query image");
        setLoading(true);
        setError(null);
        setResults(null);
        try {
          const data = await API.search(file, {
            model: params.model, metric: params.metric, detector: params.detector,
            align: params.align === "true", l2: params.l2 === "true", limit: parseInt(params.limit),
          });
          setResults(data);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      const selects = [
        ["model","Model",["VGG-Face","Facenet","Facenet512","ArcFace","SFace"]],
        ["metric","Distance",["cosine","euclidean","euclidean_l2"]],
        ["detector","Detector",["opencv","retinaface","mtcnn","ssd"]],
        ["limit","Limit",["5","10","20","50"]],
        ["align","Align",["true","false"]],
        ["l2","L2 Normalize",["true","false"]],
      ];

      return (
        <div className="max-w-5xl mx-auto px-8 py-10 fade-in">
          <h2 className="text-2xl font-bold mb-1">Face Search</h2>
          <p className="text-gray-500 text-sm mono mb-8">Upload a face image to find matches in the database</p>
          <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
            {/* Form */}
            <div className="lg:col-span-2">
              <div className="card p-6">
                {error && <ErrorBox msg={error} />}
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div className="drop-zone p-6 text-center"
                    onClick={() => inputRef.current.click()}
                    onDragOver={e => e.preventDefault()}
                    onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}>
                    {preview
                      ? <img src={preview} alt="" className="w-28 h-28 object-cover rounded-xl mx-auto mb-2" />
                      : <div className="text-3xl mb-2">🔍</div>}
                    <p className="text-xs text-gray-400 mono">{file ? file.name : "Select query image"}</p>
                    <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={e => handleFile(e.target.files[0])} />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    {selects.map(([key, label, opts]) => (
                      <div key={key}>
                        <label className="text-xs text-gray-500 mono block mb-1">{label}</label>
                        <select className="field text-sm" value={params[key]} onChange={e => setParam(key, e.target.value)}>
                          {opts.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>
                  <button type="submit" disabled={loading} className="btn-primary w-full py-3">
                    {loading ? "Searching…" : "Search Faces"}
                  </button>
                </form>
              </div>
            </div>

            {/* Results */}
            <div className="lg:col-span-3">
              {loading ? <Spinner /> : !results ? (
                <div className="card p-12 text-center flex flex-col items-center justify-center" style={{minHeight:"300px"}}>
                  <div className="text-5xl mb-4">👁️</div>
                  <p className="text-gray-600 mono text-sm">Results will appear here</p>
                </div>
              ) : results.total === 0 ? (
                <div className="card p-12 text-center">
                  <div className="text-4xl mb-3">🤷</div>
                  <p className="text-gray-400 mono text-sm">No matches found</p>
                </div>
              ) : (
                <div className="space-y-3 fade-in">
                  <div className="flex items-center gap-2 mb-4">
                    <span className="badge">{results.total} match{results.total !== 1 ? "es" : ""}</span>
                    <span className="text-xs text-gray-600 mono">sorted by distance ↑</span>
                  </div>
                  {results.results.map((r, i) => (
                    <div key={i} className="card p-4 flex items-center gap-4">
                      <div className="w-16 h-16 rounded-lg overflow-hidden bg-white/5 flex-shrink-0">
                        <img src={BASE + r.thumbnail_path} alt="" className="w-full h-full object-cover"
                          onError={e => e.target.style.display = "none"} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-xs text-gray-500 mono truncate">{r.file_path}</p>
                        <div className="flex items-center gap-2 mt-2">
                          <span className={`mono text-sm font-semibold ${r.distance < 0.3 ? "text-teal-400" : r.distance < 0.5 ? "text-yellow-400" : "text-red-400"}`}>
                            d = {r.distance.toFixed(4)}
                          </span>
                          <span className={`text-xs px-2 py-0.5 rounded-full mono ${r.distance < 0.3 ? "bg-teal-400/10 text-teal-400" : r.distance < 0.5 ? "bg-yellow-400/10 text-yellow-400" : "bg-red-400/10 text-red-400"}`}>
                            {r.distance < 0.3 ? "strong match" : r.distance < 0.5 ? "possible match" : "weak match"}
                          </span>
                        </div>
                      </div>
                      <span className="mono text-xs text-gray-700">#{i + 1}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [authed, setAuthed] = useState(!!getToken());
      const [page, setPage] = useState("gallery");

      function handleLogin() { setAuthed(true); setPage("gallery"); }
      function handleLogout() { localStorage.removeItem("token"); setAuthed(false); }

      if (!authed) return <AuthPage onLogin={handleLogin} />;

      return (
        <div className="min-h-screen">
          <Nav page={page} setPage={setPage} onLogout={handleLogout} />
          <main>
            {page === "gallery" && <GalleryPage setPage={setPage} />}
            {page === "upload"  && <UploadPage  setPage={setPage} />}
            {page === "search"  && <SearchPage />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
